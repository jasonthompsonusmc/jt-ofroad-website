<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JT Offroad — Build Estimator</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #e0d6c2; font-family: Inter, Arial, sans-serif; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  select option { background: #1a1a1a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const STATUS_OPTIONS = ["New","Contacted","Estimated","Sent","Won","Lost"];
const STATUS_COLORS  = {
  New:       { border:"#c9a84c", text:"#c9a84c" },
  Contacted: { border:"#4c8ec9", text:"#4c8ec9" },
  Estimated: { border:"#9b59b6", text:"#9b59b6" },
  Sent:      { border:"#e67e22", text:"#e67e22" },
  Won:       { border:"#27ae60", text:"#27ae60" },
  Lost:      { border:"#555",    text:"#888"    },
};
const GMAIL_MCP   = { type:"url", url:"https://gmailmcp.googleapis.com/mcp/v1", name:"gmail-mcp" };
const STORAGE_KEY = "jt-offroad-leads";
const KEY_STORE   = "jt-anthropic-key";

const c   = { gold:"#c9a84c", dark:"#0d0d0d", card:"#1a1a1a", border:"#2a2a2a", text:"#e0d6c2", muted:"#888" };
const inp = { background:"#111", border:"1px solid #2a2a2a", borderRadius:6, padding:"7px 10px", color:"#e0d6c2", fontSize:13, outline:"none", boxSizing:"border-box" };

function uid()           { return Math.random().toString(36).slice(2,8); }
function blankEstimate() { return { parts:[], labor:[], markup:10, notes:"" }; }
function fmt(v)          { return "$"+v.toFixed(2); }

function calcTotals(est) {
  const p   = (est.parts||[]).reduce((s,x) => s+(parseFloat(x.qty)||0)*(parseFloat(x.unitCost)||0), 0);
  const l   = (est.labor||[]).reduce((s,x) => s+(parseFloat(x.hours)||0)*(parseFloat(x.rate)||0), 0);
  const sub = p+l, mk = sub*((parseFloat(est.markup)||0)/100);
  return { partsTotal:p, laborTotal:l, subtotal:sub, markupAmt:mk, total:sub+mk };
}

function parseLeads(text) {
  return text.split(/---LEAD---/i).map(b=>b.trim()).filter(Boolean).map(block => {
    const get = f => { const m=block.match(new RegExp(`^${f}:\\s*(.+)`,"im")); return m?m[1].trim():""; };
    return { name:get("Name"), phone:get("Phone"), email:get("Email"), vehicle:get("Vehicle"), service:get("Service"), budget:get("Budget"), message:get("Message"), date:get("Date"), threadId:get("ThreadId") };
  }).filter(l => l.name||l.email);
}

async function syncGmail(apiKey, setStatus, setLeads, setDebug) {
  if (!apiKey) { alert("Enter your Anthropic API key in Settings first."); return; }
  setStatus("loading"); setDebug("");
  try {
    const res  = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "x-api-key":apiKey, "anthropic-version":"2023-06-01", "anthropic-beta":"mcp-client-2025-04-04" },
      body: JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:2000, mcp_servers:[GMAIL_MCP],
        system:`Search Gmail and extract form submission data. Output each lead separated by ---LEAD---:

---LEAD---
Name: [value]
Phone: [value]
Email: [value]
Vehicle: [value]
Service: [value]
Budget: [value]
Message: [value]
Date: [date received]
ThreadId: [thread id]

No extra text. If nothing found: NO_RESULTS`,
        messages:[{ role:"user", content:"Search Gmail for emails from:formresponses@netlify.com. Fetch full thread content for each and extract all form fields." }],
      }),
    });
    const data   = await res.json();
    const blocks = data.content||[];
    setDebug(blocks.map(b =>
      b.type==="text"            ? `[TEXT]:\n${b.text}` :
      b.type==="mcp_tool_use"    ? `[CALL]: ${b.name} → ${JSON.stringify(b.input)}` :
      b.type==="mcp_tool_result" ? `[RESULT]: ${JSON.stringify(b.content)?.slice(0,400)}` : `[${b.type}]`
    ).join("\n\n---\n\n"));
    const text = blocks.filter(b=>b.type==="text").map(b=>b.text).join("\n");
    if (!text||text.trim()==="NO_RESULTS") { setStatus("empty"); return; }
    const parsed = parseLeads(text);
    setLeads(prev => {
      const merged = parsed.map(raw => {
        const ex = prev.find(l => l.threadId===raw.threadId||(l.email===raw.email&&l.date===raw.date));
        return { id:ex?.id||uid(), ...raw, status:ex?.status||"New", notes:ex?.notes||"", estimate:ex?.estimate||blankEstimate() };
      });
      return [...merged, ...prev.filter(l=>l.manual&&!merged.find(m=>m.id===l.id))];
    });
    setStatus(parsed.length?"done":"empty");
  } catch(err) { setDebug("ERROR: "+err.message); setStatus("error"); }
}

function buildPdfHtml(lead) {
  const { partsTotal, laborTotal, subtotal, markupAmt, total } = calcTotals(lead.estimate||blankEstimate());
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Estimate — ${lead.name}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;color:#111;background:#fff;padding:40px}
  .hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;border-bottom:3px solid #c9a84c;padding-bottom:18px}
  .brand{font-size:24px;font-weight:900;color:#c9a84c;text-transform:uppercase;letter-spacing:.05em}
  .tagline{font-size:11px;color:#888;margin-top:2px}
  .sec{margin-bottom:22px}
  .sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:4px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px}
  .row{display:flex;gap:8px;font-size:13px}
  .lbl{color:#888;min-width:90px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#f5f5f5;padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#666}
  td{padding:8px 10px;border-bottom:1px solid #f0f0f0}
  .tr{text-align:right}
  .totals{margin-left:auto;width:260px;margin-top:12px}
  .trow{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #f0f0f0;color:#555}
  .tfinal{display:flex;justify-content:space-between;padding:10px 0;font-size:16px;font-weight:800;border-top:2px solid #c9a84c;margin-top:4px;color:#c9a84c}
  .note{background:#fafafa;border:1px solid #eee;border-radius:6px;padding:12px;font-size:13px;color:#555}
  .footer{margin-top:36px;text-align:center;font-size:11px;color:#aaa;border-top:1px solid #eee;padding-top:14px}
  @media print{body{padding:20px}}
</style></head><body>
<div class="hdr">
  <div><div class="brand">JT Offroad</div><div class="tagline">Built Beyond the Pavement · jtoffroad.com</div></div>
  <div style="text-align:right"><div style="font-size:20px;font-weight:700">Build Estimate</div><div style="font-size:12px;color:#666;margin-top:4px">${new Date().toLocaleDateString()}</div></div>
</div>
<div class="sec">
  <div class="sec-title">Customer</div>
  <div class="grid">${[["Name",lead.name],["Phone",lead.phone],["Email",lead.email],["Vehicle",lead.vehicle],["Service",lead.service],["Budget",lead.budget]].filter(([,v])=>v).map(([l,v])=>`<div class="row"><span class="lbl">${l}</span><span>${v}</span></div>`).join("")}</div>
</div>
${lead.estimate?.parts?.length?`<div class="sec"><div class="sec-title">Parts &amp; Materials</div><table><thead><tr><th>Description</th><th class="tr">Qty</th><th class="tr">Unit Cost</th><th class="tr">Total</th></tr></thead><tbody>${lead.estimate.parts.map(p=>`<tr><td>${p.description}</td><td class="tr">${p.qty}</td><td class="tr">${fmt(parseFloat(p.unitCost)||0)}</td><td class="tr">${fmt((parseFloat(p.qty)||0)*(parseFloat(p.unitCost)||0))}</td></tr>`).join("")}</tbody></table></div>`:""}
${lead.estimate?.labor?.length?`<div class="sec"><div class="sec-title">Labor</div><table><thead><tr><th>Description</th><th class="tr">Hours</th><th class="tr">Rate/hr</th><th class="tr">Total</th></tr></thead><tbody>${lead.estimate.labor.map(l=>`<tr><td>${l.description}</td><td class="tr">${l.hours}</td><td class="tr">${fmt(parseFloat(l.rate)||0)}</td><td class="tr">${fmt((parseFloat(l.hours)||0)*(parseFloat(l.rate)||0))}</td></tr>`).join("")}</tbody></table></div>`:""}
<div class="sec"><div class="totals">
  ${lead.estimate?.parts?.length?`<div class="trow"><span>Parts</span><span>${fmt(partsTotal)}</span></div>`:""}
  ${lead.estimate?.labor?.length?`<div class="trow"><span>Labor</span><span>${fmt(laborTotal)}</span></div>`:""}
  <div class="trow"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
  <div class="trow"><span>Markup (${lead.estimate?.markup||0}%)</span><span>${fmt(markupAmt)}</span></div>
  <div class="tfinal"><span>TOTAL</span><span>${fmt(total)}</span></div>
</div></div>
${lead.estimate?.notes?`<div class="sec"><div class="sec-title">Notes</div><div class="note">${lead.estimate.notes}</div></div>`:""}
${lead.notes?`<div class="sec"><div class="sec-title">Additional Notes</div><div class="note">${lead.notes}</div></div>`:""}
<div class="footer">Estimate valid 30 days · JT Offroad · jason@jtoffroad.com</div>
<script>window.onload=()=>window.print();<\/script>
</body></html>`;
}

// ── Line Item ────────────────────────────────────────────────────────────────
function LineItem({ item, type, onChange, onDelete }) {
  const total = type==="part"
    ? (parseFloat(item.qty)||0)*(parseFloat(item.unitCost)||0)
    : (parseFloat(item.hours)||0)*(parseFloat(item.rate)||0);
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 64px 90px 72px 28px", gap:6, marginBottom:6, alignItems:"center" }}>
      <input value={item.description} placeholder="Description" onChange={e=>onChange({...item,description:e.target.value})} style={{...inp,width:"100%"}} />
      <input value={type==="part"?item.qty:item.hours} placeholder={type==="part"?"Qty":"Hrs"} onChange={e=>onChange(type==="part"?{...item,qty:e.target.value}:{...item,hours:e.target.value})} style={{...inp,width:"100%",textAlign:"right"}} />
      <input value={type==="part"?item.unitCost:item.rate} placeholder={type==="part"?"Unit $":"$/hr"} onChange={e=>onChange(type==="part"?{...item,unitCost:e.target.value}:{...item,rate:e.target.value})} style={{...inp,width:"100%",textAlign:"right"}} />
      <div style={{fontSize:12,color:c.muted,textAlign:"right"}}>{fmt(total)}</div>
      <button onClick={onDelete} style={{background:"transparent",border:"none",color:"#c0392b",fontSize:18,cursor:"pointer",lineHeight:1,padding:0}}>×</button>
    </div>
  );
}

// ── Estimate Builder ─────────────────────────────────────────────────────────
function EstimateBuilder({ lead, onChange }) {
  const est = lead.estimate||blankEstimate();
  const { partsTotal, laborTotal, subtotal, markupAmt, total } = calcTotals(est);
  const upd      = patch => onChange({...lead, estimate:{...est,...patch}});
  const addPart  = () => upd({ parts:[...est.parts,{id:uid(),description:"",qty:"1",unitCost:""}] });
  const addLabor = () => upd({ labor:[...est.labor,{id:uid(),description:"",hours:"",rate:"95"}] });
  const colHdr   = cols => (
    <div style={{display:"grid",gridTemplateColumns:"1fr 64px 90px 72px 28px",gap:6,marginBottom:4}}>
      {cols.map(l=><div key={l} style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</div>)}
    </div>
  );
  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:11,color:c.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Parts &amp; Materials</div>
          <button onClick={addPart} style={{background:"transparent",border:`1px solid ${c.gold}`,borderRadius:5,padding:"3px 10px",color:c.gold,fontSize:12,cursor:"pointer"}}>+ Add Part</button>
        </div>
        {est.parts.length>0&&colHdr(["Description","Qty","Unit Cost","Total",""])}
        {est.parts.map(p=><LineItem key={p.id} item={p} type="part" onChange={v=>upd({parts:est.parts.map(x=>x.id===p.id?v:x)})} onDelete={()=>upd({parts:est.parts.filter(x=>x.id!==p.id)})} />)}
        {!est.parts.length&&<div style={{fontSize:12,color:"#444"}}>No parts added yet.</div>}
      </div>
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:11,color:c.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Labor</div>
          <button onClick={addLabor} style={{background:"transparent",border:`1px solid ${c.gold}`,borderRadius:5,padding:"3px 10px",color:c.gold,fontSize:12,cursor:"pointer"}}>+ Add Labor</button>
        </div>
        {est.labor.length>0&&colHdr(["Description","Hrs","Rate/hr","Total",""])}
        {est.labor.map(l=><LineItem key={l.id} item={l} type="labor" onChange={v=>upd({labor:est.labor.map(x=>x.id===l.id?v:x)})} onDelete={()=>upd({labor:est.labor.filter(x=>x.id!==l.id)})} />)}
        {!est.labor.length&&<div style={{fontSize:12,color:"#444"}}>No labor added yet.</div>}
      </div>
      <div style={{display:"flex",gap:20,alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Markup %</div>
          <input value={est.markup} onChange={e=>upd({markup:e.target.value})} style={{...inp,width:80,textAlign:"right"}} />
        </div>
        <div style={{background:"#0d0d0d",border:`1px solid ${c.border}`,borderRadius:8,padding:"12px 16px",flex:1}}>
          {[["Parts",partsTotal],["Labor",laborTotal],["Subtotal",subtotal],[`Markup (${est.markup}%)`,markupAmt]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:c.muted,marginBottom:5}}><span>{l}</span><span>{fmt(v)}</span></div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:800,color:c.gold,borderTop:`1px solid ${c.border}`,paddingTop:8,marginTop:4}}><span>Total</span><span>{fmt(total)}</span></div>
        </div>
      </div>
      <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Estimate Notes</div>
      <textarea value={est.notes} placeholder="Scope, disclaimers, parts availability…" onChange={e=>upd({notes:e.target.value})}
        style={{...inp,width:"100%",minHeight:70,resize:"vertical"}} />
    </div>
  );
}

// ── Settings Panel ───────────────────────────────────────────────────────────
function Settings({ apiKey, onSave, onClose }) {
  const [val, setVal] = useState(apiKey);
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}} onClick={onClose}>
      <div style={{background:"#111",border:`1px solid ${c.border}`,borderRadius:12,padding:28,width:460,maxWidth:"95vw"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:15,fontWeight:700,color:c.gold,marginBottom:6}}>Settings</div>
        <div style={{fontSize:12,color:c.muted,marginBottom:18}}>Your API key is stored locally in your browser and never sent anywhere except Anthropic's API.</div>
        <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Anthropic API Key</div>
        <input value={val} onChange={e=>setVal(e.target.value)} placeholder="sk-ant-..." type="password"
          style={{...inp,width:"100%",marginBottom:16,fontFamily:"monospace"}} />
        <div style={{fontSize:11,color:"#555",marginBottom:18}}>
          Get your key at <a href="https://console.anthropic.com" target="_blank" style={{color:c.gold}}>console.anthropic.com</a>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{onSave(val);onClose();}} style={{background:c.gold,border:"none",borderRadius:6,padding:"7px 18px",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>Save</button>
          <button onClick={onClose} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:6,padding:"7px 14px",color:c.muted,fontSize:13,cursor:"pointer"}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [leads, setLeads]                 = useState([]);
  const [syncStatus, setSyncStatus]       = useState("idle");
  const [selected, setSelected]           = useState(null);
  const [activeTab, setActiveTab]         = useState("details");
  const [filter, setFilter]               = useState("All");
  const [search, setSearch]               = useState("");
  const [debug, setDebug]                 = useState("");
  const [showDebug, setShowDebug]         = useState(false);
  const [hovered, setHovered]             = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [showSettings, setShowSettings]   = useState(false);
  const [apiKey, setApiKey]               = useState("");

  useEffect(() => {
    const saved     = localStorage.getItem(STORAGE_KEY);
    const savedKey  = localStorage.getItem(KEY_STORE);
    if (saved)    try { setLeads(JSON.parse(saved)); } catch(_) {}
    if (savedKey) setApiKey(savedKey);
  }, []);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
  }, [leads]);

  const saveKey = key => { setApiKey(key); localStorage.setItem(KEY_STORE, key); };

  const openLead  = lead => { setSelected(lead); setActiveTab("details"); setConfirmDelete(false); };
  const closeLead = ()   => { setSelected(null); setConfirmDelete(false); };

  const updateField = (id, field, val) => {
    setLeads(prev => prev.map(l => l.id===id?{...l,[field]:val}:l));
    if (selected?.id===id) setSelected(p=>({...p,[field]:val}));
  };
  const updateSelected = updated => {
    setLeads(prev => prev.map(l => l.id===updated.id?updated:l));
    setSelected(updated);
  };
  const deleteLead = id => { setLeads(prev=>prev.filter(l=>l.id!==id)); closeLead(); };

  const estTotal = lead => {
    const { total } = calcTotals(lead.estimate||blankEstimate());
    return total>0?fmt(total):null;
  };

  const downloadPdf = lead => {
    const html  = buildPdfHtml(lead);
    const blob  = new Blob([html],{type:"text/html"});
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement("a");
    a.href      = url;
    a.download  = `JT-Offroad-Estimate-${(lead.name||"estimate").replace(/\s+/g,"-")}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const counts   = STATUS_OPTIONS.reduce((a,s)=>{ a[s]=leads.filter(l=>l.status===s).length; return a; },{});
  const filtered = leads.filter(l =>
    (filter==="All"||l.status===filter) &&
    (!search||[l.name,l.email,l.vehicle,l.service].some(v=>v?.toLowerCase().includes(search.toLowerCase())))
  );

  return (
    <div style={{background:c.dark,minHeight:"100vh",color:c.text,fontFamily:"Inter,Arial,sans-serif"}}>

      {/* Header */}
      <div style={{background:"#111",borderBottom:`2px solid ${c.gold}`,padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:18,fontWeight:800,color:c.gold,textTransform:"uppercase",letterSpacing:"0.05em"}}>JT Offroad — Build Estimator</div>
          <div style={{fontSize:11,color:c.muted}}>Built Beyond the Pavement</div>
        </div>
        <button onClick={()=>setShowSettings(true)} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:6,padding:"6px 12px",color:c.muted,fontSize:12,cursor:"pointer"}}>
          ⚙ Settings
        </button>
      </div>

      <div style={{padding:"20px 24px"}}>

        {/* Stats */}
        <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
          {[["Total",leads.length,c.gold],...STATUS_OPTIONS.map(s=>[s,counts[s]||0,STATUS_COLORS[s].text])].map(([label,num,color])=>(
            <div key={label} style={{background:c.card,border:`1px solid ${color}`,borderRadius:8,padding:"10px 16px",textAlign:"center",minWidth:64}}>
              <div style={{fontSize:22,fontWeight:800,color}}>{num}</div>
              <div style={{fontSize:10,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</div>
            </div>
          ))}
        </div>

        {/* Toolbar */}
        <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
          <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}
            style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:6,padding:"7px 12px",color:c.text,fontSize:13,width:180,outline:"none"}} />
          {["All",...STATUS_OPTIONS].map(s=>(
            <button key={s} onClick={()=>setFilter(s)} style={{background:filter===s?c.gold:c.card,border:`1px solid ${filter===s?c.gold:c.border}`,borderRadius:6,padding:"5px 10px",color:filter===s?"#000":c.muted,fontSize:12,cursor:"pointer",fontWeight:filter===s?700:400}}>{s}</button>
          ))}
          <button onClick={()=>setShowDebug(v=>!v)} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:6,padding:"5px 10px",color:"#555",fontSize:11,cursor:"pointer",marginLeft:"auto"}}>
            {showDebug?"Hide Debug":"Debug"}
          </button>
          <button onClick={()=>syncGmail(apiKey,setSyncStatus,setLeads,setDebug)} disabled={syncStatus==="loading"}
            style={{background:c.gold,border:"none",borderRadius:6,padding:"7px 16px",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {syncStatus==="loading"?"⏳ Syncing…":"⟳ Sync Gmail"}
          </button>
        </div>

        {/* Empty states */}
        {!apiKey && (
          <div style={{textAlign:"center",padding:"40px 0",color:"#555"}}>
            <div style={{fontSize:30,marginBottom:10}}>🔑</div>
            <div style={{marginBottom:8}}>Add your Anthropic API key in <strong style={{color:c.gold,cursor:"pointer"}} onClick={()=>setShowSettings(true)}>Settings</strong> to get started.</div>
          </div>
        )}
        {apiKey&&syncStatus==="idle"&&!leads.length&&(
          <div style={{textAlign:"center",padding:"60px 0",color:"#555"}}>
            <div style={{fontSize:36,marginBottom:10}}>📬</div>
            <div>Hit <strong style={{color:c.gold}}>Sync Gmail</strong> to pull your build requests</div>
          </div>
        )}
        {syncStatus==="empty"&&!leads.length&&<div style={{textAlign:"center",padding:"60px 0",color:"#555"}}>🔍 No submissions found.</div>}
        {syncStatus==="error"&&<div style={{textAlign:"center",padding:40,color:"#e74c3c"}}>⚠️ Error — check debug output below.</div>}

        {/* Table */}
        {leads.length>0&&(
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr>{["Customer","Vehicle","Service","Budget","Date","Status","Estimate"].map(h=>
                <th key={h} style={{textAlign:"left",padding:"10px 12px",fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",borderBottom:"1px solid #222"}}>{h}</th>
              )}</tr>
            </thead>
            <tbody>
              {filtered.map(lead=>(
                <tr key={lead.id} style={{cursor:"pointer",background:hovered===lead.id?"#161616":"transparent",borderBottom:"1px solid #181818"}}
                  onMouseEnter={()=>setHovered(lead.id)} onMouseLeave={()=>setHovered(null)} onClick={()=>openLead(lead)}>
                  <td style={{padding:12,fontSize:13}}>
                    <div style={{fontWeight:600}}>{lead.name}</div>
                    <div style={{fontSize:11,color:"#666"}}>{lead.email}</div>
                    <div style={{fontSize:11,color:"#666"}}>{lead.phone}</div>
                  </td>
                  <td style={{padding:12,fontSize:13}}>{lead.vehicle||<span style={{color:"#444"}}>—</span>}</td>
                  <td style={{padding:12,fontSize:13}}>{lead.service||<span style={{color:"#444"}}>—</span>}</td>
                  <td style={{padding:12,fontSize:13}}>{lead.budget||<span style={{color:"#444"}}>—</span>}</td>
                  <td style={{padding:12,fontSize:13,whiteSpace:"nowrap"}}>{lead.date}</td>
                  <td style={{padding:12,fontSize:13}}>
                    <span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,border:`1px solid ${STATUS_COLORS[lead.status]?.border}`,color:STATUS_COLORS[lead.status]?.text}}>{lead.status}</span>
                  </td>
                  <td style={{padding:12,fontSize:13}}>
                    {estTotal(lead)?<span style={{color:"#27ae60",fontWeight:700}}>{estTotal(lead)}</span>:<span style={{color:"#444"}}>—</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}

        {/* Debug */}
        {showDebug&&(
          <div style={{background:"#0a0a0a",border:"1px solid #222",borderRadius:8,padding:16,marginTop:20,fontSize:11,color:"#666",fontFamily:"monospace",whiteSpace:"pre-wrap",wordBreak:"break-all",maxHeight:280,overflowY:"auto"}}>
            <div style={{color:c.gold,marginBottom:8,fontWeight:700}}>RAW GMAIL RESPONSE</div>
            {debug||"(run Sync Gmail first)"}
          </div>
        )}
      </div>

      {/* ── Lead Modal ── */}
      {selected&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={closeLead}>
          <div style={{background:"#111",border:`1px solid ${c.border}`,borderRadius:12,width:600,maxWidth:"96vw",maxHeight:"88vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>

            <div style={{padding:"16px 22px",borderBottom:`1px solid ${c.border}`,flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:700,color:c.gold}}>{selected.name}</div>
              <div style={{fontSize:12,color:c.muted,marginTop:2}}>{selected.vehicle}{selected.service?` · ${selected.service}`:""}</div>
            </div>

            <div style={{display:"flex",borderBottom:`1px solid ${c.border}`,flexShrink:0}}>
              {[["details","Details"],["estimate",`Estimate${estTotal(selected)?` · ${estTotal(selected)}`:""}`]].map(([key,label])=>(
                <button key={key} onClick={()=>setActiveTab(key)} style={{flex:1,padding:"10px",background:activeTab===key?"#1a1a1a":"transparent",border:"none",borderBottom:activeTab===key?`2px solid ${c.gold}`:"2px solid transparent",color:activeTab===key?c.gold:c.muted,fontSize:13,fontWeight:activeTab===key?700:400,cursor:"pointer"}}>{label}</button>
              ))}
            </div>

            <div style={{padding:"18px 22px",overflowY:"auto",flex:1}}>
              {activeTab==="details"&&(
                <div>
                  <div style={{background:"#0d0d0d",border:`1px solid ${c.border}`,borderRadius:8,padding:14,marginBottom:16}}>
                    <div style={{fontSize:11,color:c.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Submission</div>
                    {[["Name",selected.name],["Phone",selected.phone],["Email",selected.email],["Vehicle",selected.vehicle],["Service",selected.service],["Budget",selected.budget],["Message",selected.message],["Received",selected.date]].filter(([,v])=>v).map(([l,v])=>(
                      <div key={l} style={{display:"flex",gap:12,marginBottom:7}}>
                        <div style={{fontSize:12,color:c.muted,minWidth:100}}>{l}</div>
                        <div style={{fontSize:13}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Status</div>
                  <select value={selected.status} onChange={e=>updateField(selected.id,"status",e.target.value)}
                    style={{...inp,width:"100%",marginBottom:14}}>
                    {STATUS_OPTIONS.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                  <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Notes</div>
                  <textarea value={selected.notes} placeholder="Follow-up notes…" onChange={e=>updateField(selected.id,"notes",e.target.value)}
                    style={{...inp,width:"100%",minHeight:80,resize:"vertical"}} />
                </div>
              )}
              {activeTab==="estimate"&&<EstimateBuilder lead={selected} onChange={updateSelected} />}
            </div>

            <div style={{padding:"12px 22px",borderTop:`1px solid ${c.border}`,flexShrink:0}}>
              {!confirmDelete?(
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <button onClick={closeLead} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:6,padding:"7px 14px",color:c.muted,fontSize:13,cursor:"pointer"}}>Close</button>
                  {activeTab==="estimate"&&(
                    <button onClick={()=>downloadPdf(selected)} style={{background:c.gold,border:"none",borderRadius:6,padding:"7px 16px",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>
                      ⬇ Download PDF
                    </button>
                  )}
                  <button onClick={()=>setConfirmDelete(true)} style={{marginLeft:"auto",background:"transparent",border:"1px solid #c0392b",borderRadius:6,padding:"7px 14px",color:"#c0392b",fontSize:13,cursor:"pointer"}}>Delete</button>
                </div>
              ):(
                <div style={{background:"#1a0a0a",border:"1px solid #c0392b",borderRadius:8,padding:"12px 14px"}}>
                  <div style={{fontSize:13,color:"#e74c3c",marginBottom:10}}>Delete this estimate? This can't be undone.</div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>setConfirmDelete(false)} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:6,padding:"6px 14px",color:c.muted,fontSize:13,cursor:"pointer"}}>Cancel</button>
                    <button onClick={()=>deleteLead(selected.id)} style={{background:"#c0392b",border:"none",borderRadius:6,padding:"6px 14px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Yes, Delete</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {showSettings&&<Settings apiKey={apiKey} onSave={saveKey} onClose={()=>setShowSettings(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
