<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ── CONFIG — paste your Apps Script URL here after deploying ─────────────────
const APPS_SCRIPT_URL = localStorage.getItem("jt-script-url") || "";

const STATUS_OPTIONS = ["New","Contacted","Estimated","Sent","Won","Lost"];
const STATUS_COLORS  = {
  New:       { border:"#c9a84c", text:"#c9a84c" },
  Contacted: { border:"#4c8ec9", text:"#4c8ec9" },
  Estimated: { border:"#9b59b6", text:"#9b59b6" },
  Sent:      { border:"#e67e22", text:"#e67e22" },
  Won:       { border:"#27ae60", text:"#27ae60" },
  Lost:      { border:"#555",    text:"#888"    },
};

const c   = { gold:"#c9a84c", dark:"#0a0a0a", card:"#141414", border:"#2a2a2a", text:"#e8dfc8", muted:"#888", accent:"#b8922a" };
const inp = { background:"#111", border:"1px solid #2a2a2a", borderRadius:6, padding:"7px 10px", color:"#e0d6c2", fontSize:13, outline:"none", boxSizing:"border-box" };

function uid()           { return "JT-" + Math.random().toString(36).slice(2,8).toUpperCase(); }
function blankEstimate() { return { parts:[], labor:[], shopFee:250, notes:"" }; }
function fmt(v)          { return "$" + (parseFloat(v)||0).toFixed(2); }

function calcTotals(est) {
  const p   = (est.parts||[]).reduce((s,x) => s+(parseFloat(x.qty)||0)*(parseFloat(x.unitCost)||0), 0);
  const l   = (est.labor||[]).reduce((s,x) => s+(parseFloat(x.hours)||0)*(parseFloat(x.rate)||0), 0);
  const sub = p+l;
  const fee = parseFloat(est.shopFee)||0;
  return { partsTotal:p, laborTotal:l, subtotal:sub, markupAmt:fee, total:sub+fee };
}

// ── API calls ────────────────────────────────────────────────────────────────
const NETLIFY_FORM_ID = "6a25a36a47800900089d7400";

async function fetchLeads(scriptUrl, netlifyToken) {
  // Fetch from Netlify API directly
  if (netlifyToken) {
    const res  = await fetch(`https://api.netlify.com/api/v1/forms/${NETLIFY_FORM_ID}/submissions?access_token=${netlifyToken}&per_page=100`);
    const submissions = await res.json();
    if (Array.isArray(submissions)) {
      // Get saved estimate data from Apps Script
      let savedData = {};
      try {
        const gs = await fetch(scriptUrl);
        const gsData = await gs.json();
        (gsData.leads||[]).forEach(l => { savedData[l["ID"]] = l; });
      } catch(_) {}

      return submissions.map(sub => {
        const d    = sub.data || {};
        const id   = sub.id;
        const saved = savedData[id] || {};
        return {
          id,
          date:     new Date(sub.created_at).toLocaleString("en-US", { timeZone: "America/Los_Angeles" }),
          name:     d.name    || "",
          phone:    d.phone   || "",
          email:    d.email   || "",
          vehicle:  d.vehicle || "",
          service:  d.service || "",
          budget:   d.budget  || "",
          message:  d.message || "",
          status:   saved["Status"] || "New",
          notes:    saved["Notes"]  || "",
          estimate: saved["Estimate JSON"] ? JSON.parse(saved["Estimate JSON"]) : blankEstimate(),
        };
      });
    }
  }
  // Fallback to Apps Script
  const res  = await fetch(scriptUrl);
  const data = await res.json();
  return (data.leads||[]).map(row => ({
    id:       row["ID"],
    date:     row["Date Received"],
    name:     row["Name"],
    phone:    row["Phone"],
    email:    row["Email"],
    vehicle:  row["Vehicle"],
    service:  row["Service"],
    budget:   row["Budget"],
    message:  row["Message"],
    status:   row["Status"] || "New",
    notes:    row["Notes"]  || "",
    estimate: row["Estimate JSON"] ? JSON.parse(row["Estimate JSON"]) : blankEstimate(),
  }));
}

async function saveLead(scriptUrl, lead) {
  const { total } = calcTotals(lead.estimate||blankEstimate());
  await fetch(scriptUrl, {
    method:"POST",
    body: JSON.stringify({
      action:        "update",
      id:            lead.id,
      status:        lead.status,
      notes:         lead.notes,
      estimate:      lead.estimate,
      estimateTotal: total > 0 ? fmt(total) : "",
    }),
  });
}

async function deleteLeadRemote(scriptUrl, id) {
  await fetch(scriptUrl, {
    method:"POST",
    body: JSON.stringify({ action:"delete", id }),
  });
}

  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Estimate — ${lead.name}</title>

<div class="sec"><div class="totals">
  ${lead.estimate?.parts?.length?`<div class="trow"><span>Parts</span><span>${fmt(partsTotal)}</span></div>`:""}

${lead.notes?`<div class="sec"><div class="sec-title">Additional Notes</div><div class="note">${lead.notes}</div></div>`:""}

}

// ── Line Item ─────────────────────────────────────────────────────────────────
function LineItem({ item, type, onChange, onDelete }) {
  const total = type==="part"
    ? (parseFloat(item.qty)||0)*(parseFloat(item.unitCost)||0)
    : (parseFloat(item.hours)||0)*(parseFloat(item.rate)||0);
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 64px 90px 72px 28px",gap:6,marginBottom:6,alignItems:"center"}}>
      <input value={item.description} placeholder="Description" onChange={e=>onChange({...item,description:e.target.value})} style={{...inp,width:"100%"}} />
      <input value={type==="part"?item.qty:item.hours} placeholder={type==="part"?"Qty":"Hrs"} onChange={e=>onChange(type==="part"?{...item,qty:e.target.value}:{...item,hours:e.target.value})} style={{...inp,width:"100%",textAlign:"right"}} />
      <input value={type==="part"?item.unitCost:item.rate} placeholder={type==="part"?"Unit $":"$/hr"} onChange={e=>onChange(type==="part"?{...item,unitCost:e.target.value}:{...item,rate:e.target.value})} style={{...inp,width:"100%",textAlign:"right"}} />
      <div style={{fontSize:12,color:c.muted,textAlign:"right"}}>{fmt(total)}</div>
      <button onClick={onDelete} style={{background:"transparent",border:"none",color:"#c0392b",fontSize:18,cursor:"pointer",lineHeight:1,padding:0}}>×</button>
    </div>
  );
}

// ── Estimate Builder ──────────────────────────────────────────────────────────
function EstimateBuilder({ lead, onChange }) {
  const est = lead.estimate||blankEstimate();
  const { partsTotal, laborTotal, subtotal, markupAmt, total } = calcTotals(est);
  const upd      = patch => onChange({...lead,estimate:{...est,...patch}});
  const addPart  = () => upd({parts:[...est.parts,{id:uid(),description:"",qty:"1",unitCost:""}]});
  const addLabor = () => upd({labor:[...est.labor,{id:uid(),description:"",hours:"",rate:"95"}]});
  const colHdr   = cols => (
    <div style={{display:"grid",gridTemplateColumns:"1fr 64px 90px 72px 28px",gap:6,marginBottom:4}}>
      {cols.map(l=><div key={l} style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</div>)}
    </div>
  );
  return (
    <div>
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:11,color:c.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Parts &amp; Materials</div>
          <button onClick={addPart} style={{background:"transparent",border:`1px solid ${c.gold}`,borderRadius:5,padding:"3px 10px",color:c.gold,fontSize:12,cursor:"pointer"}}>+ Add Part</button>
        </div>
        {est.parts.length>0&&colHdr(["Description","Qty","Unit Cost","Total",""])}
        {est.parts.map(p=><LineItem key={p.id} item={p} type="part" onChange={v=>upd({parts:est.parts.map(x=>x.id===p.id?v:x)})} onDelete={()=>upd({parts:est.parts.filter(x=>x.id!==p.id)})} />)}
        {!est.parts.length&&<div style={{fontSize:12,color:"#444"}}>No parts added yet.</div>}
      </div>
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:11,color:c.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Labor</div>
          <button onClick={addLabor} style={{background:"transparent",border:`1px solid ${c.gold}`,borderRadius:5,padding:"3px 10px",color:c.gold,fontSize:12,cursor:"pointer"}}>+ Add Labor</button>
        </div>
        {est.labor.length>0&&colHdr(["Description","Hrs","Rate/hr","Total",""])}
        {est.labor.map(l=><LineItem key={l.id} item={l} type="labor" onChange={v=>upd({labor:est.labor.map(x=>x.id===l.id?v:x)})} onDelete={()=>upd({labor:est.labor.filter(x=>x.id!==l.id)})} />)}
        {!est.labor.length&&<div style={{fontSize:12,color:"#444"}}>No labor added yet.</div>}
      </div>
      <div style={{display:"flex",gap:20,alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Shop Fee ($)</div>
          <input value={est.shopFee} onChange={e=>upd({shopFee:e.target.value})} style={{...inp,width:80,textAlign:"right"}} />
        </div>
        <div style={{background:"#0d0d0d",border:`1px solid ${c.border}`,borderRadius:8,padding:"12px 16px",flex:1}}>
          {[["Parts",partsTotal],["Labor",laborTotal],["Shop Fee",markupAmt]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:c.muted,marginBottom:5}}><span>{l}</span><span>{fmt(v)}</span></div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:800,color:c.gold,borderTop:`1px solid ${c.border}`,paddingTop:8,marginTop:4}}><span>Total</span><span>{fmt(total)}</span></div>
        </div>
      </div>
      <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Estimate Notes</div>
      <textarea value={est.notes} placeholder="Scope, disclaimers, parts availability…" onChange={e=>upd({notes:e.target.value})}
        style={{...inp,width:"100%",minHeight:70,resize:"vertical"}} />
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({ scriptUrl, netlifyToken, onSave, onClose }) {
  const [url, setUrl]     = useState(scriptUrl);
  const [token, setToken] = useState(netlifyToken);
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}} onClick={onClose}>
      <div style={{background:"#111",border:`1px solid ${c.border}`,borderRadius:12,padding:28,width:500,maxWidth:"95vw"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:15,fontWeight:700,color:c.gold,marginBottom:20}}>Settings</div>
        <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Netlify Access Token</div>
        <input value={token} onChange={e=>setToken(e.target.value)} placeholder="nfp_..." type="password"
          style={{...inp,width:"100%",marginBottom:6,fontFamily:"monospace",fontSize:11}} />
        <div style={{fontSize:11,color:"#555",marginBottom:18}}>Used to read form submissions directly from Netlify. Stored locally in your browser only.</div>
        <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Apps Script URL</div>
        <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..."
          style={{...inp,width:"100%",marginBottom:20,fontFamily:"monospace",fontSize:11}} />
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{onSave(url,token);onClose();}} style={{background:c.gold,border:"none",borderRadius:6,padding:"7px 18px",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>Save</button>
          <button onClick={onClose} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:6,padding:"7px 14px",color:c.muted,fontSize:13,cursor:"pointer"}}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [leads, setLeads]                 = useState([]);
  const [loading, setLoading]             = useState(false);
  const [lastSync, setLastSync]           = useState("");
  const [selected, setSelected]           = useState(null);
  const [activeTab, setActiveTab]         = useState("details");
  const [filter, setFilter]               = useState("All");
  const [search, setSearch]               = useState("");
  const [hovered, setHovered]             = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [showSettings, setShowSettings]   = useState(false);
  const [scriptUrl, setScriptUrl]         = useState(localStorage.getItem("jt-script-url")||"")
  const [netlifyToken, setNetlifyToken]   = useState(localStorage.getItem("jt-netlify-token")||"");
  const [saving, setSaving]               = useState(false);
  const [error, setError]                 = useState("");

  const saveSettings = (url, token) => { setScriptUrl(url); localStorage.setItem("jt-script-url", url); setNetlifyToken(token); localStorage.setItem("jt-netlify-token", token); };

  const EDITS_KEY = "jt-lead-edits";

  // Load saved edits from localStorage
  const getSavedEdits = () => {
    try { return JSON.parse(localStorage.getItem(EDITS_KEY) || "{}"); } catch(_) { return {}; }
  };

  // Merge Netlify submissions with locally saved edits
  const mergeWithSavedEdits = (data) => {
    const edits = getSavedEdits();
    return data.map(lead => {
      const saved = edits[lead.id] || {};
      return {
        ...lead,
        status:   saved.status   || lead.status   || "New",
        notes:    saved.notes    !== undefined ? saved.notes    : lead.notes,
        estimate: saved.estimate || lead.estimate  || blankEstimate(),
      };
    });
  };

  const saveEditsLocally = (lead) => {
    const edits = getSavedEdits();
    edits[lead.id] = { status: lead.status, notes: lead.notes, estimate: lead.estimate };
    localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
  };

  const loadLeads = async () => {
    if (!scriptUrl) return;
    setLoading(true); setError("");
    try {
      const data = await fetchLeads(scriptUrl, netlifyToken);
      setLeads(mergeWithSavedEdits(data));
      setLastSync(new Date().toLocaleTimeString());
    } catch(e) { setError("Could not load leads: " + e.message); }
    setLoading(false);
  };

  useEffect(() => { if (scriptUrl) loadLeads(); }, [scriptUrl]);

  const openLead  = lead => { setSelected(lead); setActiveTab("details"); setConfirmDelete(false); };
  const closeLead = ()   => { setSelected(null); setConfirmDelete(false); };

  const updateAndSave = updated => {
    setLeads(prev => prev.map(l => l.id===updated.id?updated:l));
    setSelected(updated);
    saveEditsLocally(updated);
    saveLead(scriptUrl, updated).catch(()=>{});
  };

  const updateField = (id, field, val) => {
    const updated = leads.find(l=>l.id===id);
    if (!updated) return;
    updateAndSave({...updated,[field]:val});
  };

  const handleDelete = id => {
    const currentIndex = leads.findIndex(l => l.id === id);
    const remaining    = leads.filter(l => l.id !== id);
    setLeads(remaining);
    // Auto-open next lead, or previous if at end, or close if none left
    if (remaining.length > 0) {
      const nextIndex = currentIndex < remaining.length ? currentIndex : remaining.length - 1;
      setSelected(remaining[nextIndex]);
      setActiveTab("details");
      setConfirmDelete(false);
    } else {
      closeLead();
    }
    // Fire delete to sheet in background - don't await, don't let response affect state
    fetch(scriptUrl, { method:"POST", body: JSON.stringify({ action:"delete", id }) }).catch(()=>{});
    // Remove from local edits cache
    const edits = getSavedEdits();
    delete edits[id];
    localStorage.setItem(EDITS_KEY, JSON.stringify(edits));
  };

  const downloadPdf = lead => {
    const html = buildPdfHtml(lead);
    const blob = new Blob([html],{type:"text/html"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=`JT-Offroad-Estimate-${(lead.name||"estimate").replace(/\s+/g,"-")}.html`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const estTotal = lead => {
    const { total } = calcTotals(lead.estimate||blankEstimate());
    return total>0?fmt(total):null;
  };

  const counts   = STATUS_OPTIONS.reduce((a,s)=>{ a[s]=leads.filter(l=>l.status===s).length; return a; },{});
  const filtered = leads.filter(l =>
    (filter==="All"||l.status===filter) &&
    (!search||[l.name,l.email,l.vehicle,l.service].some(v=>v?.toLowerCase().includes(search.toLowerCase())))
  );

  return (
    <div style={{background:c.dark,minHeight:"100vh",color:c.text,fontFamily:"Inter,Arial,sans-serif"}}>

      {/* Header */}
      <div style={{background:"#0d0d0d",borderBottom:`3px solid ${c.gold}`,padding:"0 24px",display:"flex",justifyContent:"space-between",alignItems:"center",minHeight:64}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{display:"flex",flexDirection:"column"}}>
            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:c.gold,textTransform:"uppercase",letterSpacing:"0.08em",lineHeight:1}}>JT OFFROAD</div>
            <div style={{fontFamily:"'Oswald',sans-serif",fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:"0.15em",marginTop:2}}>Build Estimator</div>
          </div>
        </div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          {lastSync&&<div style={{fontSize:11,color:"#555",fontFamily:"'Open Sans',sans-serif"}}>Synced {lastSync}</div>}
          <button onClick={()=>setShowSettings(true)} style={{background:"transparent",border:`1px solid ${c.gold}`,borderRadius:4,padding:"6px 14px",color:c.gold,fontSize:12,cursor:"pointer",fontFamily:"'Oswald',sans-serif",letterSpacing:"0.08em",textTransform:"uppercase"}}>⚙ Settings</button>
        </div>
      </div>
      {/* Hero bar */}
      <div style={{background:`linear-gradient(135deg, #111 0%, #1a1200 100%)`,borderBottom:`1px solid #2a2200`,padding:"10px 24px",display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:3,height:20,background:c.gold,borderRadius:2}}></div>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,color:"#888",textTransform:"uppercase",letterSpacing:"0.15em"}}>Northern California · Built Beyond the Pavement</div>
      </div>

      <div style={{padding:"20px 24px"}}>

        {/* No script URL state */}
        {!scriptUrl&&(
          <div style={{textAlign:"center",padding:"60px 0",color:"#555"}}>
            <div style={{fontSize:36,marginBottom:12}}>🔧</div>
            <div style={{marginBottom:8,fontSize:15}}>Paste your Google Apps Script URL in <strong style={{color:c.gold,cursor:"pointer"}} onClick={()=>setShowSettings(true)}>Settings</strong> to get started.</div>
            <div style={{fontSize:12,color:"#444"}}>Follow the setup guide to deploy your script first.</div>
          </div>
        )}

        {error&&<div style={{background:"#1a0a0a",border:"1px solid #c0392b",borderRadius:8,padding:"10px 16px",marginBottom:16,fontSize:13,color:"#e74c3c"}}>{error}</div>}

        {scriptUrl&&(
          <>
            {/* Stats */}
            <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
              {[["Total",leads.length,c.gold],...STATUS_OPTIONS.map(s=>[s,counts[s]||0,STATUS_COLORS[s].text])].map(([label,num,color])=>(
                <div key={label} style={{background:"#0f0f0f",border:`1px solid ${color}33`,borderRadius:4,padding:"10px 18px",textAlign:"center",minWidth:64,borderTop:`2px solid ${color}`}}>
                  <div style={{fontSize:22,fontWeight:800,color}}>{num}</div>
                  <div style={{fontSize:10,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</div>
                </div>
              ))}
            </div>

            {/* Toolbar */}
            <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
              <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}
                style={{background:c.card,border:`1px solid ${c.border}`,borderRadius:6,padding:"7px 12px",color:c.text,fontSize:13,width:180,outline:"none"}} />
              {["All",...STATUS_OPTIONS].map(s=>(
                <button key={s} onClick={()=>setFilter(s)} style={{background:filter===s?c.gold:c.card,border:`1px solid ${filter===s?c.gold:c.border}`,borderRadius:6,padding:"5px 10px",color:filter===s?"#000":c.muted,fontSize:12,cursor:"pointer",fontWeight:filter===s?700:400}}>{s}</button>
              ))}
              <button onClick={loadLeads} disabled={loading} style={{marginLeft:"auto",background:c.gold,border:"none",borderRadius:4,padding:"8px 20px",color:"#000",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Oswald',sans-serif",letterSpacing:"0.1em",textTransform:"uppercase"}}>
                {loading?"LOADING…":"↺ REFRESH"}
              </button>
            </div>

            {!leads.length&&!loading&&(
              <div style={{textAlign:"center",padding:"60px 0",color:"#555"}}>
                <div style={{fontSize:36,marginBottom:10}}>📬</div>
                <div>No leads yet — they'll appear here when customers submit the form on jtoffroad.com</div>
              </div>
            )}
            {loading&&<div style={{textAlign:"center",padding:"40px 0",color:c.muted}}>⏳ Loading leads…</div>}

            {/* Table */}
            {leads.length>0&&(
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr>{["Customer","Vehicle","Service","Budget","Date","Status","Estimate"].map(h=>
                    <th key={h} style={{textAlign:"left",padding:"12px 14px",fontSize:10,color:"#666",textTransform:"uppercase",letterSpacing:"0.12em",borderBottom:`2px solid ${c.gold}`,fontFamily:"'Oswald',sans-serif"}}>{h}</th>
                  )}</tr>
                </thead>
                <tbody>
                  {filtered.map(lead=>(
                    <tr key={lead.id} style={{cursor:"pointer",background:hovered===lead.id?"#161200":"transparent",borderBottom:"1px solid #1a1a1a",transition:"background 0.15s"}}
                      onMouseEnter={()=>setHovered(lead.id)} onMouseLeave={()=>setHovered(null)} onClick={()=>openLead(lead)}>
                      <td style={{padding:12,fontSize:13}}>
                        <div style={{fontWeight:600,fontFamily:"'Oswald',sans-serif",fontSize:14,letterSpacing:"0.05em",textTransform:"uppercase"}}>{lead.name}</div>
                        <div style={{fontSize:11,color:"#666"}}>{lead.email}</div>
                        <div style={{fontSize:11,color:"#666"}}>{lead.phone}</div>
                      </td>
                      <td style={{padding:12,fontSize:13}}>{lead.vehicle||<span style={{color:"#444"}}>—</span>}</td>
                      <td style={{padding:12,fontSize:13}}>{lead.service||<span style={{color:"#444"}}>—</span>}</td>
                      <td style={{padding:12,fontSize:13}}>{lead.budget||<span style={{color:"#444"}}>—</span>}</td>
                      <td style={{padding:12,fontSize:13,whiteSpace:"nowrap"}}>{lead.date}</td>
                      <td style={{padding:12,fontSize:13}}>
                        <span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,border:`1px solid ${STATUS_COLORS[lead.status]?.border}`,color:STATUS_COLORS[lead.status]?.text}}>{lead.status}</span>
                      </td>
                      <td style={{padding:12,fontSize:13}}>
                        {estTotal(lead)?<span style={{color:"#27ae60",fontWeight:700}}>{estTotal(lead)}</span>:<span style={{color:"#444"}}>—</span>}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </>
        )}
      </div>

      {/* ── Lead Modal ── */}
      {selected&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={closeLead}>
          <div style={{background:"#111",border:`1px solid ${c.border}`,borderRadius:12,width:600,maxWidth:"96vw",maxHeight:"88vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>

            <div style={{padding:"16px 22px",borderBottom:`1px solid ${c.border}`,flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:700,color:c.gold}}>{selected.name}</div>
              <div style={{fontSize:12,color:c.muted,marginTop:2}}>{selected.vehicle}{selected.service?` · ${selected.service}`:""}</div>
            </div>

            <div style={{display:"flex",borderBottom:`1px solid ${c.border}`,flexShrink:0}}>
              {[["details","Details"],["estimate",`Estimate${estTotal(selected)?` · ${estTotal(selected)}`:""}`]].map(([key,label])=>(
                <button key={key} onClick={()=>setActiveTab(key)} style={{flex:1,padding:"10px",background:activeTab===key?"#1a1a1a":"transparent",border:"none",borderBottom:activeTab===key?`2px solid ${c.gold}`:"2px solid transparent",color:activeTab===key?c.gold:c.muted,fontSize:13,fontWeight:activeTab===key?700:400,cursor:"pointer"}}>{label}</button>
              ))}
            </div>

            <div style={{padding:"18px 22px",overflowY:"auto",flex:1}}>
              {activeTab==="details"&&(
                <div>
                  <div style={{background:"#0d0d0d",border:`1px solid ${c.border}`,borderRadius:8,padding:14,marginBottom:16}}>
                    <div style={{fontSize:11,color:c.gold,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10}}>Submission</div>
                    {[["Name",selected.name],["Phone",selected.phone],["Email",selected.email],["Vehicle",selected.vehicle],["Service",selected.service],["Budget",selected.budget],["Message",selected.message],["Received",selected.date]].filter(([,v])=>v).map(([l,v])=>(
                      <div key={l} style={{display:"flex",gap:12,marginBottom:7}}>
                        <div style={{fontSize:12,color:c.muted,minWidth:100}}>{l}</div>
                        <div style={{fontSize:13}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Status</div>
                  <select value={selected.status} onChange={e=>updateField(selected.id,"status",e.target.value)}
                    style={{...inp,width:"100%",marginBottom:14}}>
                    {STATUS_OPTIONS.map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                  <div style={{fontSize:11,color:c.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Notes</div>
                  <textarea value={selected.notes} placeholder="Follow-up notes…" onChange={e=>updateField(selected.id,"notes",e.target.value)}
                    style={{...inp,width:"100%",minHeight:80,resize:"vertical"}} />
                </div>
              )}
              {activeTab==="estimate"&&<EstimateBuilder lead={selected} onChange={updateAndSave} />}
            </div>

            <div style={{padding:"12px 22px",borderTop:`1px solid ${c.border}`,flexShrink:0}}>
              {!confirmDelete?(
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <button onClick={closeLead} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:6,padding:"7px 14px",color:c.muted,fontSize:13,cursor:"pointer"}}>Close</button>
                  {activeTab==="estimate"&&(
                    <button onClick={()=>downloadPdf(selected)} style={{background:c.gold,border:"none",borderRadius:6,padding:"7px 16px",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>⬇ Download Estimate</button>
                  )}
                  <button onClick={()=>setConfirmDelete(true)} style={{marginLeft:"auto",background:"transparent",border:"1px solid #c0392b",borderRadius:6,padding:"7px 14px",color:"#c0392b",fontSize:13,cursor:"pointer"}}>Delete</button>
                </div>
              ):(
                <div style={{background:"#1a0a0a",border:"1px solid #c0392b",borderRadius:8,padding:"12px 14px"}}>
                  <div style={{fontSize:13,color:"#e74c3c",marginBottom:10}}>Delete this lead? This can't be undone.</div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={()=>setConfirmDelete(false)} style={{background:"transparent",border:`1px solid ${c.border}`,borderRadius:6,padding:"6px 14px",color:c.muted,fontSize:13,cursor:"pointer"}}>Cancel</button>
                    <button onClick={()=>handleDelete(selected.id)} style={{background:"#c0392b",border:"none",borderRadius:6,padding:"6px 14px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Yes, Delete</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {showSettings&&<Settings scriptUrl={scriptUrl} netlifyToken={netlifyToken} onSave={saveSettings} onClose={()=>setShowSettings(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
