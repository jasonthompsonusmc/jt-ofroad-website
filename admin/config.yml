
backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/jt-offroad-website
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "content/homepage.md"
        fields:
          - {label: Headline, name: headline, widget: string}
          - {label: Tagline, name: tagline, widget: text}
